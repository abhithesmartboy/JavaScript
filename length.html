        Enter Mobile Number :
        <input type="text" name="" id="num">
        <span id="nm"></span>
        <br>
        <button onclick="ch()">Check</button>
        <script>
            function ch(){
                let a = document.getElementById('num');
                if(a.value.length != 10){
                    a.style.border="2px solid red";
                    document.getElementById('nm').innerHTML = "* Invalid number";
                    document.getElementById('nm').style.color='red';
                }
                else{
                    a.style.border="2px solid black";
                    document.getElementById('nm').innerHTML = "";
                    document.getElementById('nm').style.color='';
                }
                
            }
        </script>
    </script>
