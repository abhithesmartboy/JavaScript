<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TO-DO List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body class="bg-dark">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-md-10 col-sm-12 mx-auto my-5">
        <div class="card shadow-lg">
          <div class="card-body">
            <h2 class="text-center mb-4 fw-bold">TO-DO LIST</h2>

            <div class="row g-3">
              <div class="col-12 col-sm-8">
                <input id="taskInput" type="text" placeholder="Enter Your Task"
                  class="form-control py-3 border-3 border-dark fs-5" />
              </div>
              <div class="col-12 col-sm-4">
                <button class="btn btn-danger w-100 py-3 fs-5" onclick="set()">ADD</button>
              </div>
            </div>

            <ul class="list-group mt-4" id="taskList"></ul>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/script.js"></script>
</body>

</html>
