<body>
    
    <script>
        let a = prompt("Enter your namre : ");
        //let a = "Hello how are you";
        let ar = a.split(" ");
        if(a.length==1){
            console.log(ar[0]);
        }
        else if(a.length==2){
            console.log(ar[0][0]+"."+ar[1]);
        }
        else{
            let str ="";
            for(i=0;i<ar.length-1;i++){
                str = str+ar[i][0]+".";
            }
            str = str+ar[ar.length-1];
            console.log(str);
        }
        
    </script>
