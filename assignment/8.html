<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        function ch(){
            let n = document.getElementById("num").value;
            if(n<=1){
                document.write(" Not Prime Number ");
                return;
            }
            for(let i=2; i<=n-1; i++){
                if(n%i==0){
                    document.write("Not Prime Number");
                    return;
                }
            }
           
            document.write(" Prime Number ");
        }
    </script>

</head>
<body>
    <input type="text" name="" id="num">
    <button onclick="ch()">check</button>
</body>
</html>
