<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        function check() {
            let n=document.getElementById("num").value;
            if (n%2==0) {
                document.write("Even");
            } else {
                document.write("Odd");
            }
        }
    </script>

</head>

<body>
    <input type="text" id="num">
    <button onclick="check()">Check</button>
</body>

</html>
