<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        function fact() {
            let n = document.getElementById("num").value;
            let f = 1; for (let i=1; i<=n; i++) {
                f = f * i;
            }
            document.write("Factorial is = " + f);
        }
    </script>
</head>

<body>
    <input type=" text" id="num" placeholder="Enter a number">
    <button onclick="fact()">Check</button>
</body>

</html>

</html>
