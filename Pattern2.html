<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Validation</title>
</head>
<body>
    
    <input type="text" placeholder="Enter name" id="name">
    <span id="en"></span>
    <br><br>
    <input type="email" placeholder="Enter Email" id="email">
    <span id="em"></span>
    <br><br>
    <input type="button" value="Check" onclick="ch()">

    <script>
        function ch(){
            let a = document.getElementById('name');
            let pname = /^[a-zA-Z ]{3,30}$/;
            let c = pname.test(a.value);

            let em = document.getElementById('email');
            let pem = /^[a-zA-Z0-9._]+@[a-zA-Z]+\.[a-zA-Z]{2,10}$/;
            let d = pem.test(em.value);
            
            
            if(!c){
                a.style.border = "2px solid red";
                document.getElementById('en').style.color="red";
                document.getElementById('en').innerHTML="Invalid Email";
            } else {
                a.style.border = "2px solid black";
                document.getElementById('en').innerHTML="";
            }

            
            if(!d){
                em.style.border="2px solid red";
                document.getElementById('em').style.color="red";
                document.getElementById('em').innerHTML="Invalid Email";
            } else {
                em.style.border="2px solid black";
                document.getElementById('em').innerHTML="";
            }
        }
    </script>

</body>
</html>
